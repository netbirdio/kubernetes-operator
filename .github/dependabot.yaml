version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
  - package-ecosystem: "gomod"
    directories:
      - "/test/e2e"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    groups:
      gomod-e2e:
        patterns:
          - "*"
