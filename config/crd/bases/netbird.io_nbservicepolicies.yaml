---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: nbservicepolicies.netbird.io
spec:
  group: netbird.io
  names:
    kind: NBServicePolicy
    listKind: NBServicePolicyList
    plural: nbservicepolicies
    singular: nbservicepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.private
      name: Private
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NBServicePolicy configures the NetBird reverse-proxy service backing the
          HTTPRoute(s) it targets.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NBServicePolicySpec defines the desired state of NBServicePolicy.
            properties:
              accessGroups:
                description: |-
                  AccessGroups are the NetBird group IDs whose peers may reach a private
                  service over the tunnel. Required when Private is true; ignored otherwise.
                items:
                  type: string
                type: array
              accessRestrictions:
                description: AccessRestrictions sets IP/geo connection-level restrictions.
                properties:
                  allowedCidrs:
                    description: |-
                      AllowedCidrs is a CIDR allowlist. If non-empty, only matching source IPs
                      are allowed. Evaluated before BlockedCidrs.
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: allowedCidrs entries must be valid CIDRs
                      rule: self.all(c, isCIDR(c))
                  allowedCountries:
                    description: |-
                      AllowedCountries is an ISO 3166-1 alpha-2 country-code allowlist. If
                      non-empty, only these countries are permitted.
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: allowedCountries entries must be ISO 3166-1 alpha-2
                        codes
                      rule: self.all(c, c.matches('^[A-Za-z]{2}$'))
                  blockedCidrs:
                    description: BlockedCidrs is a CIDR blocklist. Matching source
                      IPs are rejected.
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: blockedCidrs entries must be valid CIDRs
                      rule: self.all(c, isCIDR(c))
                  blockedCountries:
                    description: BlockedCountries is an ISO 3166-1 alpha-2 country-code
                      blocklist.
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: blockedCountries entries must be ISO 3166-1 alpha-2
                        codes
                      rule: self.all(c, c.matches('^[A-Za-z]{2}$'))
                type: object
              crowdsecMode:
                description: CrowdsecMode sets the CrowdSec IP-reputation handling
                  for the service.
                enum:
                - "off"
                - observe
                - enforce
                type: string
              passHostHeader:
                description: |-
                  PassHostHeader, when true, forwards the original client Host header to
                  the backend instead of rewriting it to the backend address.
                type: boolean
              private:
                description: |-
                  Private, when true, makes the service NetBird-only: inbound peers
                  authenticate via their tunnel identity (no OIDC) and an ACL policy is
                  auto-generated from AccessGroups. Requires an HTTP service.
                type: boolean
              rewriteRedirects:
                description: |-
                  RewriteRedirects, when true, rewrites Location headers in backend
                  responses to replace the backend address with the public domain.
                type: boolean
              targetRefs:
                description: |-
                  TargetRefs identify the HTTPRoute(s) this policy attaches to, following
                  the Gateway API direct policy-attachment pattern (GEP-713). Each target
                  must be an HTTPRoute in the same namespace as the policy.
                items:
                  description: |-
                    LocalPolicyTargetReference identifies an API object to apply a direct or
                    inherited policy to. This should be used as part of Policy resources
                    that can target Gateway API resources. For more information on how this
                    policy attachment model works, and a sample Policy resource, refer to
                    the policy attachment documentation for Gateway API.
                  properties:
                    group:
                      description: Group is the group of the target resource.
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      description: Kind is kind of the target resource.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: Name is the name of the target resource.
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - group
                  - kind
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-validations:
                - message: targetRefs must reference HTTPRoute in group gateway.networking.k8s.io
                  rule: self.all(t, t.kind == 'HTTPRoute' && (t.group == 'gateway.networking.k8s.io'))
            required:
            - targetRefs
            type: object
          status:
            default:
              observedGeneration: -1
            description: NBServicePolicyStatus defines the observed state of NBServicePolicy.
            properties:
              conditions:
                description: Conditions holds the conditions for the NBServicePolicy.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last reconciled generation.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
